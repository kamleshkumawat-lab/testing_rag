<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Console Dashboard - Harshwal AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col justify-between font-sans selection:bg-cyan-500 selection:text-gray-950">

    <header class="sticky top-0 z-40 backdrop-blur-md bg-gray-950/80 border-b border-gray-900 w-full">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="h-10 w-10 rounded-xl bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center font-extrabold text-white text-xl shadow-lg shadow-cyan-500/20">H</div>
                <span class="text-xl font-bold tracking-wide bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">Harshwal AI</span>
                <span class="text-[10px] font-mono bg-gray-900 text-cyan-400 border border-gray-800 px-2 py-0.5 rounded-md uppercase">Console v1.2</span>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="handleLogout()" class="text-xs font-semibold bg-gray-900 hover:bg-gray-800 border border-gray-800 text-gray-300 hover:text-white px-4 py-2 rounded-xl transition cursor-pointer">
                    <i class="fa-solid fa-power-off mr-2 text-red-500"></i>Disconnect
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl w-full mx-auto px-6 py-10 flex-1 space-y-10">
        
        <section class="grid grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-gray-900/30 border border-gray-900 p-6 rounded-2xl">
                <p class="text-xs text-gray-500 font-mono uppercase tracking-wider">Ingested Datasets</p>
                <p id="metric-total" class="text-3xl font-black text-white mt-2">0</p>
            </div>
            <div class="bg-gray-900/30 border border-gray-900 p-6 rounded-2xl">
                <p class="text-xs text-gray-500 font-mono uppercase tracking-wider">Vectors Ready</p>
                <p id="metric-completed" class="text-3xl font-black text-emerald-400 mt-2">0</p>
            </div>
            <div class="bg-gray-900/30 border border-gray-900 p-6 rounded-2xl">
                <p class="text-xs text-gray-500 font-mono uppercase tracking-wider">Mapping In Progress</p>
                <p id="metric-processing" class="text-3xl font-black text-amber-400 mt-2">0</p>
            </div>
            <div class="bg-gray-900/30 border border-gray-900 p-6 rounded-2xl">
                <p class="text-xs text-gray-500 font-mono uppercase tracking-wider">Queue Awaiting</p>
                <p id="metric-pending" class="text-3xl font-black text-cyan-400 mt-2">0</p>
            </div>
        </section>

        <section class="grid lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-4">
                <div class="flex items-center justify-between border-b border-gray-900 pb-3">
                    <h2 class="text-sm font-mono uppercase tracking-wider text-gray-400 flex items-center">
                        <i class="fa-solid fa-comments text-cyan-400 mr-2"></i>Active Context Sessions
                    </h2>
                    <button onclick="createNewConversation()" class="text-xs text-cyan-400 hover:text-cyan-300 font-bold flex items-center cursor-pointer">
                        <i class="fa-solid fa-plus mr-1"></i> New Chat
                    </button>
                </div>
                <div id="conversations-container" class="space-y-2.5 max-h-[500px] overflow-y-auto pr-1">
                    </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <div class="flex items-center justify-between border-b border-gray-900 pb-3">
                    <div class="flex items-center space-x-3">
                        <h2 class="text-sm font-mono uppercase tracking-wider text-gray-400 flex items-center">
                            <i class="fa-solid fa-file-invoice text-blue-400 mr-2"></i>Knowledge Ingest Index
                        </h2>
                        <div id="polling-indicator" class="hidden text-[10px] text-cyan-400 font-mono items-center space-x-1 animate-pulse">
                            <i class="fa-solid fa-arrows-rotate animate-spin text-[9px]"></i> <span>syncing matrix...</span>
                        </div>
                    </div>
                    <button onclick="openUploadModal()" class="bg-cyan-500 hover:bg-cyan-400 text-gray-950 font-bold px-3 py-1.5 rounded-lg text-xs transition cursor-pointer">
                        <i class="fa-solid fa-cloud-arrow-up mr-1"></i> Ingest Raw Text
                    </button>
                </div>

                <div class="overflow-x-auto border border-gray-900 rounded-xl bg-gray-900/20">
                    <table class="w-full text-left border-collapse table-fixed">
                        <thead>
                            <tr class="border-b border-gray-900 bg-gray-900/40 text-[10px] font-mono uppercase tracking-wider text-gray-500">
                                <th class="p-4 w-1/3">Document Title</th>
                                <th class="p-4 w-1/2">Raw Content Excerpt</th>
                                <th class="p-4 w-1/6">Status Token</th>
                            </tr>
                        </thead>
                        <tbody id="documents-table-body" class="text-sm text-gray-300">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div id="upload-modal" class="hidden fixed inset-0 z-50 bg-gray-950/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-800 rounded-2xl max-w-lg w-full p-6 space-y-4">
            <div class="flex items-center justify-between border-b border-gray-800 pb-3">
                <h3 class="text-sm font-mono uppercase tracking-wider text-gray-200">Inject Raw Knowledge Protocol</h3>
                <button onclick="closeUploadModal()" class="text-gray-500 hover:text-white cursor-pointer"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="upload-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-mono uppercase tracking-wider text-gray-400 mb-2">Document Title</label>
                    <input type="text" id="doc-title" name="title" required class="w-full bg-gray-950 border border-gray-800 focus:border-cyan-500 focus:outline-none rounded-xl py-2.5 px-4 text-sm" placeholder="e.g., The Benefits of Reading Books">
                </div>
                <div>
                    <label class="block text-xs font-mono uppercase tracking-wider text-gray-400 mb-2">Raw Text Payload Content</label>
                    <textarea id="doc-raw-text" name="raw_text" rows="6" required class="w-full bg-gray-950 border border-gray-800 focus:border-cyan-500 focus:outline-none rounded-xl py-2.5 px-4 text-sm resize-none" placeholder="Paste the complete document raw string body here..."></textarea>
                </div>
                <button type="submit" id="upload-submit-btn" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-gray-950 font-bold py-3 rounded-xl text-xs cursor-pointer">
                    <span id="upload-btn-text">Stream Layer Into Pipeline</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        const accessToken = localStorage.getItem('access_token');
        if (!accessToken) { window.location.href = "/login/"; }

        let isPollingActive = false;
        let pollingIntervalId = null;

        function openUploadModal() { document.getElementById('upload-modal').classList.remove('hidden'); }
        function closeUploadModal() { document.getElementById('upload-modal').classList.add('hidden'); }
        function handleLogout() { localStorage.clear(); window.location.href = "/login/"; }

        // Fetch metrics dashboard data securely and map fields
        async function fetchDashboardContent(showMicroLoader = false) {
            const pollingIndicator = document.getElementById('polling-indicator');
            if (showMicroLoader) pollingIndicator.classList.remove('hidden');

            try {
                const response = await fetch("/api/dashboard-metrics/", {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const result = await response.json();
                
                if (response.ok && result.success) {
                    // Inject metrics values securely 
                    document.getElementById('metric-total').innerText = result.metrics.total_documents || 0;
                    document.getElementById('metric-completed').innerText = result.metrics.completed_documents || 0;
                    document.getElementById('metric-processing').innerText = result.metrics.processing_documents || 0;
                    document.getElementById('metric-pending').innerText = result.metrics.pending_documents || 0;

                    // Render Conversations Lists 
                    const convContainer = document.getElementById('conversations-container');
                    convContainer.innerHTML = '';
                    if (!result.conversations || result.conversations.length === 0) {
                        convContainer.innerHTML = `<div class="text-center py-12 text-gray-600 text-xs font-mono">No chat histories.</div>`;
                    } else {
                        result.conversations.forEach(conv => {
                            convContainer.innerHTML += `
                                <a href="/conversations/${conv.id}/" class="block bg-gray-900/40 hover:bg-gray-900 border border-gray-900 p-4 rounded-xl group transition">
                                    <div class="flex items-center justify-between">
                                        <span class="text-sm font-semibold text-gray-200 truncate pr-2">${conv.title}</span>
                                        <i class="fa-solid fa-chevron-right text-[10px] text-gray-600 group-hover:translate-x-1 transition shrink-0"></i>
                                    </div>
                                </a>`;
                        });
                    }

                    // Render Ingested Documents inside Table
                    const docTableBody = document.getElementById('documents-table-body');
                    docTableBody.innerHTML = '';
                    
                    let containsActiveBackgroundTasks = false;

                    if (!result.documents || result.documents.length === 0) {
                        docTableBody.innerHTML = `<tr><td colspan="3" class="text-center py-12 text-gray-600 text-xs font-mono">No context documents found.</td></tr>`;
                    } else {
                        result.documents.forEach(doc => {
                            const currentStatus = doc.status ? doc.status.toUpperCase() : 'PENDING';
                            let badge = ``;
                            
                            // Check if Celery is currently handling any file in the background
                            if (currentStatus === 'PENDING') {
                                badge = `<span class="px-2 py-0.5 rounded text-[10px] font-mono bg-cyan-950/50 border border-cyan-900 text-cyan-400">Awaiting Queue</span>`;
                                containsActiveBackgroundTasks = true;
                            } else if (currentStatus === 'PROCESSING') {
                                badge = `<span class="px-2 py-0.5 rounded text-[10px] font-mono bg-amber-950/50 border border-amber-900 text-amber-400 animate-pulse"><i class="fa-solid fa-circle-notch animate-spin mr-1"></i>Mapping</span>`;
                                containsActiveBackgroundTasks = true;
                            } else if (currentStatus === 'COMPLETED') {
                                badge = `<span class="px-2 py-0.5 rounded text-[10px] font-mono bg-emerald-950/50 border border-emerald-900 text-emerald-400"><i class="fa-solid fa-circle-check mr-1"></i>Synced</span>`;
                            } else if (currentStatus === 'FAILED') {
                                badge = `<span class="px-2 py-0.5 rounded text-[10px] font-mono bg-red-950/50 border border-red-900 text-red-400"><i class="fa-solid fa-circle-xmark mr-1"></i>Failed</span>`;
                            }

                            docTableBody.innerHTML += `
                                <tr class="border-b border-gray-900/50 hover:bg-gray-900/10 transition">
                                    <td class="p-4 font-bold text-white truncate">${doc.title || 'Untitled'}</td>
                                    <td class="p-4 text-xs text-gray-400 truncate">${doc.raw_text || 'No text content available'}</td>
                                    <td class="p-4">${badge}</td>
                                </tr>`;
                        });
                    }

                    // Smaart Polling Core Controller:
                    // Agar ek bhi file processing ya pending hai, toh updates check karne ke liye auto-refresh chalu rakhein
                    if (containsActiveBackgroundTasks && !isPollingActive) {
                        startAutomatedPolling();
                    } else if (!containsActiveBackgroundTasks && isPollingActive) {
                        stopAutomatedPolling();
                    }
                }
            } catch (err) { console.error("Metrics layer sync anomaly:", err); }
            finally { pollingIndicator.classList.add('hidden'); }
        }

        // Functions to start and stop background sync
        function startAutomatedPolling() {
            isPollingActive = true;
            pollingIntervalId = setInterval(() => {
                fetchDashboardContent(true); // pass true to display small sync loader text
            }, 4000); // Polls server dashboard every 4 seconds
        }

        function stopAutomatedPolling() {
            isPollingActive = false;
            clearInterval(pollingIntervalId);
        }

        // Create New Chat Context Handler
        async function createNewConversation() {
            try {
                const response = await fetch("/api/conversations/", {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: "New Chat" })
                });
                const res = await response.json();
                if (response.ok && res.success) { window.location.href = `/conversations/${res.data.id}/`; }
            } catch (err) { alert('Failed to create chat session.'); }
        }

        // Document Submit Pipeline Action
        document.getElementById('upload-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('upload-submit-btn');
            const btnText = document.getElementById('upload-btn-text');
            
            // UI state updates: Disable form while submitting
            submitBtn.disabled = true;
            btnText.innerText = "Queueing into Celery Worker Cluster...";

            const payload = {
                title: document.getElementById('doc-title').value,
                raw_text: document.getElementById('doc-raw-text').value
            };

            try {
                const response = await fetch("/api/documents/", {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                const res = await response.json();
                if (response.ok && res.success) {
                    closeUploadModal();
                    document.getElementById('upload-form').reset();
                    
                    // Immediately request fresh content, triggering automatic background polling loop
                    fetchDashboardContent(); 
                } else { 
                    alert('Ingestion pipeline rejected payload: ' + JSON.stringify(res.errors)); 
                }
            } catch (err) { 
                alert('Pipeline configuration error.'); 
            } finally {
                submitBtn.disabled = false;
                btnText.innerText = "Stream Layer Into Pipeline";
            }
        });

        // Initial setup run
        fetchDashboardContent();
    </script>
</body>
</html>
