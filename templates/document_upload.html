<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ingest Portal - Harshwal AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        if(!localStorage.getItem("access")){ window.location.href = "{% url 'ui-login' %}"; }
    </script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col font-sans">

    <header class="h-20 border-b border-gray-900 bg-gray-900/50 px-8 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <a href="{% url 'ui-dashboard' %}" class="h-9 w-9 rounded-xl bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center font-extrabold text-white text-lg">H</a>
            <span class="text-sm text-gray-400"><a href="{% url 'ui-dashboard' %}" class="hover:underline text-gray-200">Dashboard</a> &rarr; Ingest</span>
        </div>
    </header>

    <main class="max-w-3xl w-full mx-auto p-8 flex-1 flex flex-col justify-center">
        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-xl">
            <h3 class="text-xl font-bold text-white mb-1"><i class="fa-solid fa-cloud-arrow-up text-cyan-400 mr-2"></i>Parse SEO Base Articles</h3>
            <p class="text-xs text-gray-400 mb-6">Convert long text files into deep context chunks for real-time semantic processing layers.</p>

            <form id="docForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Article Title Reference</label>
                    <input type="text" id="title" placeholder="e.g., SEO Schema Configuration Protocol Guide" required class="w-full bg-gray-950 border border-gray-800 focus:border-cyan-500 rounded-xl px-4 py-3 text-sm text-white focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Document Core Payload Text Content</label>
                    <textarea id="raw_text" rows="8" placeholder="Paste full contextual article documentation layer text..." required class="w-full bg-gray-950 border border-gray-800 focus:border-cyan-500 rounded-xl px-4 py-3 text-sm text-white focus:outline-none transition resize-none"></textarea>
                </div>
                <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-400 text-gray-950 font-bold py-3.5 px-4 rounded-xl transition shadow-md font-sans">
                    <i class="fa-solid fa-bolt mr-2"></i>Index Vector Chunk Segmentations
                </button>
            </form>

            <pre id="result" class="mt-4 p-4 bg-gray-950 rounded-xl text-xs font-mono text-cyan-400 border border-gray-800 overflow-x-auto hidden"></pre>
        </div>
    </main>

    <script>
    document.getElementById("docForm").addEventListener("submit", async function(e){
        e.preventDefault();
        const resBox = document.getElementById("result");
        resBox.classList.remove("hidden");
        resBox.innerText = "Transmitting chunk blocks to REST API embedding gateway...";

        const token = localStorage.getItem("access");
        const response = await fetch("/api/documents/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                title: document.getElementById("title").value,
                raw_text: document.getElementById("raw_text").value,
                metadata: { category: "SEO", language: "en" }
            })
        });
        const data = await response.json();
        resBox.innerText = JSON.stringify(data, null, 4);
        if(response.ok) { document.getElementById("raw_text").value = ""; }
    });
    </script>
</body>
</html>
